name: NeoRogue
main: me.neoblade298.neorogue.NeoRogue
authors: [Ascheladd, FoPzl]
depend: [NeoCore, WorldEdit, PlaceholderAPI, Vault]
softdepend: [MythicMobs]
version: 1.0
api-version: 1.20
commands:
   nr:
      description: NeoRogue General command
      permission: neorogue.general
   nradmin:
      aliases: [nra]
      description: NeoRogue Admin command
      permission: neorogue.admin
permissions:
   neorogue.general:
      description: Allows use of /nr commands
      default: true
   neorogue.admin:
      description: Allows use of /nradmin commands
      default: op
   neorogue.slots.2:
    description: Grants 2 save slots
    default: false
   neorogue.slots.3:
    description: Grants 3 save slots
    default: false
   neorogue.slots.5:
    description: Grants 5 save slots
    default: false
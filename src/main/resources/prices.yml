# ==========================================================================
# Material pricing configuration
# --------------------------------------------------------------------------
# Grounding reference: 1 DIAMOND = 100 currency.
# Prices are currency units (decimals allowed), valued relative to that anchor.
#
# Keys must be valid Bukkit Material enum names (uppercase, underscores).
# Unknown material names are logged and skipped on load.
#
# This file is the current pricing backend. The loader is written against a
# swappable source interface (MaterialPriceSource), so a SQL-backed source can
# be dropped in later without touching consumers of MaterialPrices.
# ==========================================================================

prices:
